<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ecede - Generative AI OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2>GSCI - Acceso al Sistema</h2>
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <span>Terminal Ecedeño</span>
            <button onclick="logout()">Cerrar Sesión</button>
        </header>
        <main>
            <div id="status">Estado: <span id="ia-status">Esperando órdenes...</span></div>
            <textarea id="prompt" placeholder="Describe el programa o web que quieres generar..."></textarea>
            <button id="generate-btn">Ejecutar Generación y Debugging</button>
            <div id="output-console"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
